services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - db_data:/data
    environment:
      DATABASE_URL: file:/data/db.sqlite
      # Generate with: openssl rand -hex 32
      APP_SECRET: ${APP_SECRET}
      # Optional: lock in the API key via env instead of the Settings UI
      # ANTHROPIC_API_KEY is no longer used directly — set it via /setup or /settings
      CRON_SECRET: ${CRON_SECRET:-}

volumes:
  db_data:
